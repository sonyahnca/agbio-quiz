<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#8957e5">
<title>농업유전학 퀴즈</title>
<link rel="manifest" href="manifest-gen.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="topbar">
  <button id="homeBtn" class="ghost" hidden>← 홈</button>
  <div id="title">🧬 농업유전학</div>
  <div id="timer" hidden>00:00</div>
  <button id="helpBtn" class="ghost" title="필수 용어">?</button>
</header>

<main id="app"></main>

<!-- 이 페이지는 농업유전학 전용 PWA(독립 앱). 런처(index.html)로의 링크는 두지 않는다 -->
<script src="data/농업유전학.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
